# Redis configuration for Coinbase EOD Pipeline

# Persistence — RDB snapshot for crash recovery
# Save if at least 1 key changed in 60 seconds
save 60 1
# Save if at least 10 keys changed in 30 seconds
save 30 10

# AOF (Append Only File) for stronger durability
appendonly yes
appendfilename "coinbase_eod.aof"
# Flush to disk every second (balance of safety vs perf)
appendfsync everysec   

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile "/data/redis.log"

# Security — bind to all interfaces inside Docker network
bind 0.0.0.0
protected-mode no

# Timeouts
tcp-keepalive 300
timeout 0
